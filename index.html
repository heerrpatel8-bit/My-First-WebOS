<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Heer's WebOS</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #111;
        line-height: 1.7;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
        background-size: cover;
      }
      .topbar {
        position: fixed;
        inset: 24px 24px auto auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        width: calc(100% - 48px);
        max-width: 1200px;
        padding: 14px 18px;
        border-radius: 999px;
        background: rgba(255,255,255,0.3);
        color: #111;
        font-size: 0.95rem;
        box-shadow: 0 18px 50px rgba(0,0,0,0.18);
      }
      .topbar .label {
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .topbar .status {
        display: flex;
        gap: 18px;
        align-items: center;
      }
      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 40px;
        background: rgba(255,255,255,0.18);
      }
      .card {
        width: min(1200px, 100%);
        display: grid;
        grid-template-columns: 1.25fr 0.85fr;
        gap: 36px;
        padding: 56px;
        border-radius: 32px;
        background: rgba(255,255,255,0.92);
        box-shadow: 0 45px 90px rgba(0,0,0,0.18);
      }
      .intro {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
      }
      .intro h1 {
        margin: 0;
        font-size: clamp(3rem, 5vw, 4.4rem);
        line-height: 0.95;
      }
      .intro p {
        margin: 0;
        font-size: 1.05rem;
        color: #444;
        max-width: 700px;
      }
      .intro a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 16px 32px;
        border-radius: 999px;
        background: #111;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        box-shadow: 0 20px 42px rgba(0,0,0,0.16);
      }
      .intro a:hover {
        transform: translateY(-2px);
        background: #333;
      }
      .profile {
        display: grid;
        gap: 24px;
      }
      .profile-card {
        background: #f7f4ef;
        border-radius: 26px;
        padding: 30px;
        box-shadow: 0 26px 55px rgba(0,0,0,0.1);
      }
      .profile-card h2 {
        margin: 0 0 16px;
        font-size: 2rem;
      }
      .profile-card p {
        margin: 0;
        color: #4f4a45;
      }
      .profile-card small {
        display: block;
        margin-top: 16px;
        color: #7a756f;
      }
      @media (max-width: 980px) {
        .card {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 680px) {
        .topbar {
          position: static;
          width: auto;
          margin: 0 auto 20px;
        }
        .hero {
          padding: 40px 18px 24px;
        }
        .card {
          padding: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="label">Heer</div>
      <div class="status">
        <span>☀️ Always Learning</span>
        <span>June 27, 2026</span>
      </div>
    </div>
    <main class="hero">
      <section class="card">
        <div class="intro">
          <h1>Welcome to Heer's WebOS</h1>
          <p> Every expert was once a beginner.</p>
          <p>This website is my journey—one project, one lesson, and one challenge at a time.</p>
          <a href="page2.html">More about me</a>
        </div>
      </section>
    </main>
  </body>
</html>
