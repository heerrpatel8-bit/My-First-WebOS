<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Heer's WebOS</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #111;
        line-height: 1.7;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
        background-size: cover;
      }
      .topbar {
        position: fixed;
        inset: 24px 24px auto auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        width: calc(100% - 48px);
        max-width: 1200px;
        padding: 14px 18px;
        border-radius: 999px;
        background: rgba(255,255,255,0.3);
        color: #111;
        font-size: 0.95rem;
        box-shadow: 0 18px 50px rgba(0,0,0,0.18);
      }
      .topbar .label {
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
        color: inherit;
        font: inherit;
      }
      .topbar .label:focus {
        outline: 2px solid rgba(0,0,0,0.18);
        outline-offset: 3px;
      }
      .topbar .status {
        display: flex;
        gap: 18px;
        align-items: center;
      }
      .topbar .clock {
        font-variant-numeric: tabular-nums;
      }
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 40px;
        background: rgba(255,255,255,0.18);
      }
      .card {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(760px, 100%);
        display: grid;
        grid-template-columns: 1.25fr 0.85fr;
        gap: 32px;
        padding: 42px;
        border-radius: 32px;
        background: rgba(255,255,255,0.92);
        box-shadow: 0 45px 90px rgba(0,0,0,0.18);
      }
      .window-header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 24px;
        margin: -42px -42px 36px;
        border-radius: 32px 32px 0 0;
        background: rgba(255,255,255,0.98);
        border-bottom: 1px solid rgba(0,0,0,0.08);
      }
      .drag-area {
        display: flex;
        flex-direction: column;
        gap: 2px;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }
      .drag-area:active {
        cursor: grabbing;
      }
      .drag-area strong {
        font-size: 1rem;
      }
      .drag-area small {
        color: #666;
      }
      .window-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 75, 75, 0.1);
        color: #c22;
        font-size: 1rem;
        cursor: pointer;
        transition: background 160ms ease, transform 160ms ease;
      }
      .window-close:hover {
        background: rgba(255, 75, 75, 0.18);
        transform: translateY(-1px);
      }
      .intro {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
      }
      .intro h1 {
        margin: 0;
        font-size: clamp(3rem, 5vw, 4.4rem);
        line-height: 0.95;
      }
      .intro p {
        margin: 0;
        font-size: 1.05rem;
        color: #444;
        max-width: 700px;
      }
      .intro a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 16px 32px;
        border-radius: 999px;
        background: #111;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        box-shadow: 0 20px 42px rgba(0,0,0,0.16);
      }
      .intro a:hover {
        transform: translateY(-2px);
        background: #333;
      }
      .profile {
        display: grid;
        gap: 24px;
      }
      .profile-card {
        background: #f7f4ef;
        border-radius: 26px;
        padding: 30px;
        box-shadow: 0 26px 55px rgba(0,0,0,0.1);
      }
      .profile-card h2 {
        margin: 0 0 16px;
        font-size: 2rem;
      }
      .profile-card p {
        margin: 0;
        color: #4f4a45;
      }
      .profile-card small {
        display: block;
        margin-top: 16px;
        color: #7a756f;
      }
      @media (max-width: 980px) {
        .card {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 680px) {
        .topbar {
          position: static;
          width: auto;
          margin: 0 auto 20px;
        }
        .hero {
          padding: 40px 18px 24px;
        }
        .card {
          position: static;
          transform: none;
          padding: 32px;
        }
        .window-header {
          margin: 0 0 24px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <button type="button" class="label" id="brandToggle">Heer</button>
      <div class="status">
        <span class="clock" id="topbarClock">--:--</span>
        <span>☀️ Always Learning</span>
        <span>June 27, 2026</span>
      </div>
    </div>
    <main class="hero">
      <section class="card" id="welcomeWindow" hidden>
        <div class="window-header">
          <div class="drag-area" id="windowDragHandle">
            <strong>Welcome to Heer's WebOS</strong>
            <small>Drag this window</small>
          </div>
          <button type="button" class="window-close" id="windowCloseButton" aria-label="Close window">×</button>
        </div>
        <div class="intro">
          <p>Every expert was once a beginner.</p>
          <p>This website is my journey—one project, one lesson, and one challenge at a time.</p>
          <a href="page2.html">More about me</a>
        </div>
      </section>
    </main>
    <script>
      const welcomeWindow = document.getElementById('welcomeWindow');
      const dragHandle = document.getElementById('windowDragHandle');
      const closeButton = document.getElementById('windowCloseButton');
      const brandToggle = document.getElementById('brandToggle');
      let isDragging = false;
      let dragTarget = null;
      let offsetX = 0;
      let offsetY = 0;

      const openWindow = () => {
        welcomeWindow.hidden = false;
        welcomeWindow.style.display = 'grid';
      };

      const closeWindow = () => {
        welcomeWindow.hidden = true;
        welcomeWindow.style.display = 'none';
      };

      function startDrag(targetWindow, handle, event) {
        const rect = targetWindow.getBoundingClientRect();
        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;
        targetWindow.style.transform = 'none';
        targetWindow.style.left = `${rect.left}px`;
        targetWindow.style.top = `${rect.top}px`;
        isDragging = true;
        dragTarget = targetWindow;
        handle.setPointerCapture(event.pointerId);
      }

      dragHandle.addEventListener('pointerdown', (event) => startDrag(welcomeWindow, dragHandle, event));

      closeButton.addEventListener('click', (event) => {
        event.stopPropagation();
        closeWindow();
      });

      brandToggle.addEventListener('click', () => {
        if (welcomeWindow.hidden) {
          openWindow();
        } else {
          closeWindow();
        }
      });

      document.addEventListener('pointermove', (event) => {
        if (!isDragging || !dragTarget) return;
        dragTarget.style.left = `${event.clientX - offsetX}px`;
        dragTarget.style.top = `${event.clientY - offsetY}px`;
      });

      document.addEventListener('pointerup', () => {
        isDragging = false;
        dragTarget = null;
      });

      const clockElement = document.getElementById('topbarClock');
      function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        clockElement.textContent = `${hours}:${minutes}:${seconds}`;
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
